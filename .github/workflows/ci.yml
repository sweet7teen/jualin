name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"

jobs:
  validate:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: belidisini
        ports:
          - 3306:3306
        options: --health-cmd "mysqladmin ping -h localhost" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @belidisini/backend lint

      - name: Type check
        run: pnpm --filter @belidisini/backend exec tsc --noEmit

      - name: Prisma validate
        run: pnpm --filter @belidisini/database exec prisma validate

      - name: Prisma migrate
        run: pnpm --filter @belidisini/database exec prisma migrate deploy
        env:
          DATABASE_URL: mysql://root:root@localhost:3306/belidisini

      - name: Build backend
        run: pnpm --filter @belidisini/backend build

      - name: Build frontend
        run: pnpm --filter @belidisini/web build

      - name: Run tests
        run: pnpm --filter @belidisini/backend test --passWithNoTests
